
    <!doctype html>
    <html lang="en">
    <head>
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <title>Benin Digital Exhibition</title>
      <style>
    body {
    margin: 0;
    font-family: "Georgia", serif;
    background: #0b0b0b;
    color: #eaeaea;
    }

    /* HERO */
    .hero {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    background: #000;
    }

    .hero-inner {
    max-width: 700px;
    }

    .hero h1 {
    font-size: 48px;
    font-weight: 500;
    margin-bottom: 20px;
    }

    .hero-sub {
    color: #aaa;
    font-size: 16px;
    margin-bottom: 30px;
    }

    .enter-btn {
    color: white;
    text-decoration: none;
    border: 1px solid #444;
    padding: 12px 24px;
    border-radius: 30px;
    transition: 0.3s;
    }

    .enter-btn:hover {
    background: white;
    color: black;
    }

    /* CLUSTERS */
    .cluster-section {
    padding: 100px 60px;
    border-top: 1px solid #1a1a1a;
    }

    .cluster-header h2 {
      font-size: 28px;
      margin-bottom: 5px;
    }

    .cluster-header p {
      color: #777;
      margin-bottom: 40px;
    }

    /* FEATURED */
    .featured {
      max-width: 900px;
      margin-bottom: 60px;
    }

    .featured img {
      width: 100%;
      filter: grayscale(100%);
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 40px;
    }

    /* CARD */
    .card {
      background: #111;
      border: 1px solid #222;
      border-radius: 6px;
      overflow: hidden;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-6px);
    }

    .card img {
      width: 100%;
      display: block;
      filter: grayscale(100%);
    }
    .card {
      text-decoration: none;
      color: inherit;
    }
    .card-content {
      padding: 16px;
    }

    .artifact-id {
      font-size: 12px;
      color: #888;
    }

    .title {
      margin-top: 6px;
      font-size: 14px;
    }

    .description {
      margin-top: 8px;
      font-size: 12px;
      color: #aaa;
    }
    </style>
    </head>
    <body>
      
    <section class="hero">
    <div class="hero-inner">
    <h1>Benin Digital Exhibition</h1>
    <p class="hero-sub">
      A machine-generated visual grouping of Benin artifacts based on image similarity.
    </p>
    <div class="toolbar">
      <input id="searchBox" type="search" placeholder="Search by artifact ID, title, or description">
    </div>
    <a href="#cluster-00" class="enter-btn">Enter Archive ↓</a>
    </div>
    </section>
    
      <main>
        
      </main>
      <footer>
        Generated from paired artifact plates, CLIP clusters, and catalog descriptions.
      </footer>
    
      <script>
    const searchBox = document.getElementById('searchBox');
    const cards = Array.from(document.querySelectorAll('.card'));
    const sections = Array.from(document.querySelectorAll('.cluster-section'));

    function applyFilter() {
      const q = searchBox.value.trim().toLowerCase();

      cards.forEach(card => {
        const hay = card.dataset.text + ' ' + card.dataset.artifact;
        const show = !q || hay.includes(q);
        card.classList.toggle('hidden', !show);
      });

      sections.forEach(section => {
        const visibleCards = section.querySelectorAll('.card:not(.hidden)');
        section.classList.toggle('hidden', visibleCards.length === 0);
      });
    }

    searchBox.addEventListener('input', applyFilter);

    #/* ✅ ADD THIS PART BELOW */
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
      anchor.addEventListener('click', function (e) {
        e.preventDefault();
        document.querySelector(this.getAttribute('href'))
          .scrollIntoView({ behavior: 'smooth' });
      });
    });
    
    function closeLightbox() {
        document.getElementById('lightbox').style.display = 'none';
    }
    searchBox.addEventListener('input', applyFilter);
    </script>
    <div id="lightbox" onclick="closeLightbox()">
        <img id="lightbox-img">
    </div>
    </body>
    </html>
